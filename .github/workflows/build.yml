name: Create Windows Installer
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: pip install pyinstaller pyautogui Pillow requests

      - name: Download and Prepare Engine
        shell: powershell
        run: |
          # 1. Setup Folder
          New-Item -ItemType Directory -Force -Path bin
          
          # 2. Use 7zip (pre-installed) to download and extract in one go
          # This avoids the "Corrupt ZIP" error entirely
          $url = "https://github.com/ggerganov/llama.cpp/releases/download/b3000/llama-b3000-bin-win-vulkan-x64.zip"
          Write-Host "Downloading engine with curl..."
          curl.exe -L -o engine.zip $url
          
          # 3. Extract using 7z.exe (very robust)
          & "C:\Program Files\7-Zip\7z.exe" x engine.zip -obin -y
          
          # 4. Verify
          if (Test-Path "bin\llama-cli.exe") {
              Write-Host "Success: llama-cli.exe is ready."
          } else {
              throw "Engine file was not found after extraction."
          }

      - name: Build Software EXE
        run: pyinstaller --onefile --noconsole --name "AIAgent_Internal" src/main.py

      - name: Create Installer (Inno Setup)
        run: iscc /dAppVersion="1.0" /dAppExeName="AIAgent_Internal.exe" installer_script.iss

      - name: Upload Professional Installer
        uses: actions/upload-artifact@v4
        with:
          name: AIAgent_Setup_Wizard
          path: output/AIAgent_Setup.exe
