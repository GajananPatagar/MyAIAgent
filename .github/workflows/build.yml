name: Create Windows Installer
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: pip install pyinstaller pyautogui Pillow requests

      - name: Download and Unzip Engine
        run: |
          mkdir bin
          # Using curl for guaranteed network access on GitHub Runners
          curl -L -o engine.zip https://github.com/ggerganov/llama.cpp/releases/download/b3000/llama-b3000-bin-win-vulkan-x64.zip
          
          # Use Windows native tar to extract the zip into the bin folder
          tar -xf engine.zip -C bin/

      - name: Build Software EXE
        run: |
          # Packaging your Python script into a professional EXE
          pyinstaller --onefile --noconsole --name "AIAgent_Internal" src/main.py

      - name: Create Installer (Inno Setup)
        run: |
          # This compiles the .iss script into the final Setup.exe
          iscc /dAppVersion="1.0" /dAppExeName="AIAgent_Internal.exe" installer_script.iss

      - name: Upload Professional Installer
        uses: actions/upload-artifact@v4
        with:
          name: AIAgent_Setup_Wizard
          path: output/AIAgent_Setup.exe
