name: Create Windows Installer
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: pip install pyinstaller pyautogui Pillow requests

      - name: Download and Unzip Engine
        shell: powershell
        run: |
          # 1. Create bin directory
          if (!(Test-Path "bin")) { New-Item -ItemType Directory -Path "bin" }
          
          # 2. Download the engine using PowerShell (more reliable for Windows ZIPs)
          $url = "https://github.com/ggerganov/llama.cpp/releases/download/b3000/llama-b3000-bin-win-vulkan-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "engine.zip"
          
          # 3. Extract using PowerShell native Expand-Archive
          Expand-Archive -Path "engine.zip" -DestinationPath "bin" -Force
          
          # 4. Verify extraction
          if (Test-Path "bin\llama-cli.exe") {
              Write-Host "Success: llama-cli.exe found in bin folder."
          } else {
              Write-Error "Failure: llama-cli.exe not found after extraction."
              exit 1
          }

      - name: Build Software EXE
        run: |
          pyinstaller --onefile --noconsole --name "AIAgent_Internal" src/main.py

      - name: Create Installer (Inno Setup)
        run: |
          iscc /dAppVersion="1.0" /dAppExeName="AIAgent_Internal.exe" installer_script.iss

      - name: Upload Professional Installer
        uses: actions/upload-artifact@v4
        with:
          name: AIAgent_Setup_Wizard
          path: output/AIAgent_Setup.exe
