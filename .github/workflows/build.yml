name: Create Windows Installer
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyInstaller
        run: pip install pyinstaller pyautogui

      - name: Build Software EXE
        run: |
          pyinstaller --onefile --noconsole --name "AIAgent_Internal" src/main.py

      - name: Create Installer (Inno Setup)
        run: |
          # This creates the professional 'Setup.exe'
          iscc /dAppVersion="1.0" /dAppExeName="AIAgent_Internal.exe" installer_script.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AIAgent_Setup_Wizard
          path: output/setup.exe
